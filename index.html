<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breakout Starter</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    canvas {
      background: black;
      border: 3px solid white;
    }

    .za-warudo {
      filter: grayscale(1) contrast(1.4) brightness(0.7);
    }

    #zaText {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      font-weight: bold;
      color: rgba(255, 200, 50, 0.9);
      opacity: 0;
    }

    @keyframes zaEcho {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      20% { opacity: 1; }
      60% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
    }
  </style>
</head>

<body>
<canvas id="gameCanvas" width="800" height="500"></canvas>
<div id="zaText">ZA WARUDO</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let timeStopped = false;
let bitesActive = false;
let rewinding = false;

// =====================
// HISTORY
// =====================
let ballHistory = [];
const MAX_HISTORY = 500;

let rewindDuration = 8000;
let rewindStartTime = 0;
let highlightPoints = [];

// =====================
// EASING
// =====================
function easeInOutCubic(t) {
  return t < 0.5
    ? 4 * t * t * t
    : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// =====================
// BALL
// =====================
function randomAngle() {
  const a = (Math.random() * Math.PI / 2) + Math.PI / 4;
  const s = 4;
  return {
    x: Math.cos(a) * s * (Math.random() < 0.5 ? 1 : -1),
    y: -Math.abs(Math.sin(a) * s)
  };
}

const ball = {
  x: 400,
  y: 400,
  radius: 10,
  speedX: 3,
  speedY: -3
};

// =====================
// PADDLE
// =====================
const paddle = {
  width: 120,
  height: 15,
  x: 340,
  y: 470,
  speed: 8,
  dx: 0
};

// =====================
// BRICKS
// =====================
const brickInfo = {
  rows: 4,
  cols: 8,
  width: 85,
  height: 25,
  padding: 10,
  offsetTop: 50,
  offsetLeft: 20
};

let score = 0;
let lives = 3;
let gameOver = false;

const bricks = [];

for (let r = 0; r < brickInfo.rows; r++) {
  bricks[r] = [];
  for (let c = 0; c < brickInfo.cols; c++) {
    bricks[r][c] = { x: 0, y: 0, visible: true };
  }
}

// =====================
// INPUT
// =====================
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") paddle.dx = paddle.speed;
  if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
  if (e.key.toLowerCase() === "z") activateZaWarudo();
  if (e.key.toLowerCase() === "x") activateBites();
});

document.addEventListener("keyup", e => {
  if (e.key.includes("Arrow")) paddle.dx = 0;
});

// =====================
// ZA WARUDO (simple placeholder)
// =====================
function activateZaWarudo() {
  if (timeStopped) return;
  timeStopped = true;
  document.body.classList.add("za-warudo");

  const sx = ball.speedX;
  const sy = ball.speedY;

  const start = performance.now();

  function slow(now) {
    const t = Math.min((now - start) / 500, 1);
    ball.speedX = sx * (1 - t);
    ball.speedY = sy * (1 - t);
    if (t < 1) requestAnimationFrame(slow);
    else {
      ball.speedX = 0;
      ball.speedY = 0;
    }
  }

  requestAnimationFrame(slow);

  setTimeout(() => {
    timeStopped = false;
    ball.speedX = sx;
    ball.speedY = sy;
    document.body.classList.remove("za-warudo");
  }, 8000);
}

// =====================
// BITES THE DUST (FIXED + DOT SYSTEM)
// =====================
function activateBites() {
  if (bitesActive || timeStopped) return;

  bitesActive = true;
  rewinding = true;

  highlightPoints = [];
  for (let i = 0; i < 10; i++) {
    if (ballHistory.length)
      highlightPoints.push(Math.floor(Math.random() * ballHistory.length));
  }

  rewindStartTime = performance.now();

  setTimeout(() => {
    const n = randomAngle();
    ball.x = 400;
    ball.y = 400;
    ball.speedX = n.x;
    ball.speedY = n.y;

    rewinding = false;
    bitesActive = false;
    ballHistory = [];
    highlightPoints = [];
  }, rewindDuration);
}

// =====================
// MOVEMENT
// =====================
function movePaddle() {
  paddle.x += paddle.dx;
  paddle.x = Math.max(0, Math.min(800 - paddle.width, paddle.x));
}

function moveBall() {
  if (timeStopped || bitesActive) return;

  ball.x += ball.speedX;
  ball.y += ball.speedY;

  if (ball.x < 0 || ball.x > 800) ball.speedX *= -1;
  if (ball.y < 0) ball.speedY *= -1;

  // paddle
  if (
    ball.y + ball.radius > paddle.y &&
    ball.x > paddle.x &&
    ball.x < paddle.x + paddle.width
  ) ball.speedY *= -1;

  // history
  ballHistory.push({ x: ball.x, y: ball.y });
  if (ballHistory.length > MAX_HISTORY) ballHistory.shift();
}

// =====================
// REWIND
// =====================
function rewindBall() {
  const now = performance.now();
  const t = Math.min((now - rewindStartTime) / rewindDuration, 1);
  const eased = easeInOutCubic(t);
  const rev = 1 - eased;

  const idx = rev * (ballHistory.length - 1);
  const i = Math.floor(idx);
  const n = Math.min(i + 1, ballHistory.length - 1);

  const p1 = ballHistory[i];
  const p2 = ballHistory[n];

  if (p1 && p2) {
    const lerp = idx - i;
    ball.x = p1.x + (p2.x - p1.x) * lerp;
    ball.y = p1.y + (p2.y - p1.y) * lerp;
  }

  highlightPoints = highlightPoints.filter(h => h < i);
}

// =====================
// DRAW
// =====================
function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();
}

function drawPaddle() {
  ctx.fillStyle = "white";
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
}

function drawBricks() {
  for (let r = 0; r < brickInfo.rows; r++) {
    for (let c = 0; c < brickInfo.cols; c++) {
      const b = bricks[r][c];
      if (!b.visible) continue;

      const x = c * (brickInfo.width + brickInfo.padding) + brickInfo.offsetLeft;
      const y = r * (brickInfo.height + brickInfo.padding) + brickInfo.offsetTop;

      b.x = x; b.y = y;

      ctx.fillStyle = "deepskyblue";
      ctx.fillRect(x, y, brickInfo.width, brickInfo.height);
    }
  }
}

function brickCollision() {
  for (let r = 0; r < brickInfo.rows; r++) {
    for (let c = 0; c < brickInfo.cols; c++) {
      const b = bricks[r][c];
      if (!b.visible) continue;

      if (
        ball.x > b.x &&
        ball.x < b.x + brickInfo.width &&
        ball.y > b.y &&
        ball.y < b.y + brickInfo.height
      ) {
        b.visible = false;
        ball.speedY *= -1;
        score++;
      }
    }
  }
}

// =====================
// LOOP
// =====================
function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, 800, 500);

  drawPaddle();

  if (rewinding) {
    rewindBall();
  } else {
    movePaddle();
    moveBall();
    brickCollision();
  }

  drawBricks();
  drawBall();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
