<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breakout Starter</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: filter 0.3s ease;
    }

    h1 { margin-bottom: 10px; }

    canvas {
      background: black;
      border: 3px solid white;
    }

    .instructions {
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
      max-width: 500px;
    }

    .za-warudo {
      filter: grayscale(1) contrast(1.4) brightness(0.7);
    }

    #zaText {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      font-weight: bold;
      color: rgba(255, 200, 50, 0.9);
      text-shadow: 
        0 0 10px rgba(255,200,50,0.8),
        0 0 20px rgba(255,100,200,0.6),
        0 0 30px rgba(0,150,255,0.6);
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes zaEcho {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      20% { opacity: 1; }
      60% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
    }
  </style>
</head>

<body>
  <h1>Breakout Starter Game</h1>
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <div id="zaText">ZA WARUDO</div>

  <div class="instructions">
    Arrow keys to move • Press Z to activate ZA WARUDO
  </div>

  <audio id="zaWarudoSound" src="zawarudo.mp3"></audio>
  <audio id="tomattaSound" src="tomatta.mp3"></audio>
  <audio id="timeResumeSound" src="time resumes.mp3"></audio>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const zaWarudoSound = document.getElementById("zaWarudoSound");
    const tomattaSound = document.getElementById("tomattaSound");
    const timeResumeSound = document.getElementById("timeResumeSound");
    const zaText = document.getElementById("zaText");

    let timeStopped = false;
    let savedBallSpeedX = 0;
    let savedBallSpeedY = 0;

    let score = 0;
    let lives = 3;
    let gameOver = false;
    let bricksCleared = false;

    const paddle = {
      width: 120,
      height: 15,
      x: canvas.width / 2 - 60,
      y: canvas.height - 30,
      speed: 8,
      dx: 0
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height - 50,
      radius: 10,
      speedX: 4,
      speedY: -4,
      speedMultiplier: 1.02
    };

    const trail = [];

    const brickInfo = {
      rows: 4,
      cols: 8,
      width: 85,
      height: 25,
      padding: 10,
      offsetTop: 50,
      offsetLeft: 20
    };

    const bricks = [];

    for (let r = 0; r < brickInfo.rows; r++) {
      bricks[r] = [];
      for (let c = 0; c < brickInfo.cols; c++) {
        bricks[r][c] = { x: 0, y: 0, visible: true };
      }
    }

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height - 50;
      ball.speedX = 4 * (Math.random() > 0.5 ? 1 : -1);
      ball.speedY = -4;
      trail.length = 0;
    }

    function activateZaWarudo() {
      if (timeStopped) return;

      timeStopped = true;
      document.body.classList.add("za-warudo");

      savedBallSpeedX = ball.speedX;
      savedBallSpeedY = ball.speedY;

      setTimeout(() => {
        zaWarudoSound.play();
        setTimeout(() => {
          zaText.style.animation = "zaEcho 1.5s ease-out";
        }, 670);
      }, 100);

      setTimeout(() => {
        timeResumeSound.play();
      }, 5700);

      setTimeout(() => {
        timeStopped = false;
        ball.speedX = savedBallSpeedX;
        ball.speedY = savedBallSpeedY;
        document.body.classList.remove("za-warudo");
      }, 8000);
    }

    function drawBall() {
      // Trail
      trail.push({ x: ball.x, y: ball.y });
      if (trail.length > 8) trail.shift();

      trail.forEach((t, i) => {
        ctx.beginPath();
        ctx.arc(t.x, t.y, ball.radius * (i / trail.length), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,165,0,${i / trail.length * 0.4})`;
        ctx.fill();
      });

      // Main ball
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = "orange";
      ctx.fill();
    }

    function drawPaddle() {
      ctx.fillStyle = "white";
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    }

    function drawBricks() {
      for (let r = 0; r < brickInfo.rows; r++) {
        for (let c = 0; c < brickInfo.cols; c++) {
          const brick = bricks[r][c];
          if (brick.visible) {
            const brickX = c * (brickInfo.width + brickInfo.padding) + brickInfo.offsetLeft;
            const brickY = r * (brickInfo.height + brickInfo.padding) + brickInfo.offsetTop;
            brick.x = brickX;
            brick.y = brickY;

            ctx.fillStyle = "deepskyblue";
            ctx.fillRect(brickX, brickY, brickInfo.width, brickInfo.height);
          }
        }
      }
    }

    function drawUI() {
      ctx.fillStyle = "white";
      ctx.fillText("Score: " + score, 20, 30);
      ctx.fillText("Lives: " + lives, canvas.width - 100, 30);
    }

    function moveBall() {
      if (timeStopped) return;

      ball.x += ball.speedX;
      ball.y += ball.speedY;

      if (ball.x <= 0 || ball.x >= canvas.width) ball.speedX *= -1;
      if (ball.y <= 0) ball.speedY *= -1;

      // Paddle collision with angle control
      if (
        ball.y + ball.radius > paddle.y &&
        ball.x > paddle.x &&
        ball.x < paddle.x + paddle.width
      ) {
        let hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
        ball.speedX = hitPos * 6;

        ball.speedY *= -1;

        // Speed increase
        ball.speedX *= ball.speedMultiplier;
        ball.speedY *= ball.speedMultiplier;

        if (bricksCleared) {
          resetBricks();
          bricksCleared = false;
        }
      }

      // Bottom collision (life loss)
      if (ball.y > canvas.height) {
        lives--;
        if (lives <= 0) {
          gameOver = true;
        } else {
          resetBall();
        }
      }
    }

    function brickCollision() {
      if (timeStopped) return;

      for (let r = 0; r < brickInfo.rows; r++) {
        for (let c = 0; c < brickInfo.cols; c++) {
          const brick = bricks[r][c];

          if (
            brick.visible &&
            ball.x > brick.x &&
            ball.x < brick.x + brickInfo.width &&
            ball.y > brick.y &&
            ball.y < brick.y + brickInfo.height
          ) {
            ball.speedY *= -1;
            brick.visible = false;
            score++;

            // slight speed increase on hit
            ball.speedX *= 1.01;
            ball.speedY *= 1.01;

            if (score % (brickInfo.rows * brickInfo.cols) === 0) {
              bricksCleared = true;
            }
          }
        }
      }
    }

    function resetBricks() {
      for (let r = 0; r < brickInfo.rows; r++) {
        for (let c = 0; c < brickInfo.cols; c++) {
          bricks[r][c].visible = true;
        }
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowRight") paddle.dx = paddle.speed;
      if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
      if (e.key.toLowerCase() === "z") activateZaWarudo();
    });

    document.addEventListener("keyup", e => {
      if (e.key === "ArrowRight" || e.key === "ArrowLeft") paddle.dx = 0;
    });

    function draw() {
      // Motion blur effect
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawPaddle();
      drawBall();
      drawBricks();
      drawUI();

      if (!gameOver) {
        paddle.x += paddle.dx;
        moveBall();
        brickCollision();
        requestAnimationFrame(draw);
      } else {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
      }
    }

    draw();
  </script>
</body>
</html>
