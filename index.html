<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout Starter</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

canvas {
  background:black;
  border:3px solid white;
}

.za-warudo {
  filter: grayscale(1) contrast(1.4) brightness(0.7);
}

#zaText {
  position: fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:80px;
  opacity:0;
  color:gold;
}

@keyframes zaEcho {
  0% {opacity:0; transform:scale(0.8);}
  30% {opacity:1;}
  100% {opacity:0; transform:scale(1.5);}
}
</style>
</head>

<body>

<h1>Breakout Starter</h1>
<canvas id="gameCanvas" width="800" height="500"></canvas>
<div id="zaText">ZA WARUDO</div>

<audio id="zaWarudoSound" src="zawarudo.mp3"></audio>
<audio id="tomattaSound" src="tomatta.mp3"></audio>
<audio id="timeResumeSound" src="time resumes.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const zaWarudoSound = document.getElementById("zaWarudoSound");
const tomattaSound = document.getElementById("tomattaSound");
const timeResumeSound = document.getElementById("timeResumeSound");
const zaText = document.getElementById("zaText");

let timeStopped = false;
let slowMotion = false;

// ===== BALL TRAIL =====
let trail = [];

const paddle = {
  width:120,
  height:15,
  x:340,
  y:470,
  speed:8,
  dx:0
};

const ball = {
  x:400,
  y:450,
  radius:10,
  speedX:4,
  speedY:-4
};

const brickInfo = {
  rows:4,
  cols:8,
  width:85,
  height:25,
  padding:10,
  offsetTop:50,
  offsetLeft:20
};

let bricks=[];
let score=0;
let lives=3;
let gameOver=false;
let bricksCleared=false;

for (let r=0;r<brickInfo.rows;r++){
  bricks[r]=[];
  for (let c=0;c<brickInfo.cols;c++){
    bricks[r][c]={x:0,y:0,visible:true};
  }
}

// ===== SPEED SYSTEM =====
function increaseSpeed(){
  let speed=Math.sqrt(ball.speedX**2+ball.speedY**2);
  if(speed<10){
    ball.speedX*=1.02;
    ball.speedY*=1.02;
  }
}

// ===== SLOW MOTION =====
function triggerSlowMotion(){
  slowMotion=true;
  setTimeout(()=>slowMotion=false,120);
}

// ===== ZA WARUDO =====
function activateZaWarudo(){
  if(timeStopped) return;

  timeStopped=true;
  document.body.classList.add("za-warudo");

  let sx=ball.speedX, sy=ball.speedY;

  setTimeout(()=>{
    (Math.random()<0.5?zaWarudoSound:tomattaSound).play();

    setTimeout(()=>{
      zaText.style.animation="zaEcho 1.5s";
    },670);
  },100);

  setTimeout(()=>timeResumeSound.play(),5700);

  setTimeout(()=>{
    timeStopped=false;
    ball.speedX=sx;
    ball.speedY=sy;
    document.body.classList.remove("za-warudo");
  },8000);
}

// ===== DRAW TRAIL =====
function drawTrail(){
  for(let i=0;i<trail.length;i++){
    let t=trail[i];
    ctx.globalAlpha=i/trail.length;
    ctx.beginPath();
    ctx.arc(t.x,t.y,ball.radius,0,Math.PI*2);
    ctx.fillStyle="orange";
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ===== BALL =====
function drawBall(){
  trail.push({x:ball.x,y:ball.y});
  if(trail.length>10) trail.shift();

  drawTrail();

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);
  ctx.fillStyle="orange";
  ctx.fill();
}

// ===== PADDLE =====
function drawPaddle(){
  ctx.fillStyle="white";
  ctx.fillRect(paddle.x,paddle.y,paddle.width,paddle.height);
}

// ===== BRICKS =====
function drawBricks(){
  for(let r=0;r<brickInfo.rows;r++){
    for(let c=0;c<brickInfo.cols;c++){
      let b=bricks[r][c];
      if(b.visible){
        let bx=c*(brickInfo.width+brickInfo.padding)+brickInfo.offsetLeft;
        let by=r*(brickInfo.height+brickInfo.padding)+brickInfo.offsetTop;
        b.x=bx; b.y=by;
        ctx.fillStyle="deepskyblue";
        ctx.fillRect(bx,by,brickInfo.width,brickInfo.height);
      }
    }
  }
}

function resetBricks(){
  for(let r=0;r<brickInfo.rows;r++)
    for(let c=0;c<brickInfo.cols;c++)
      bricks[r][c].visible=true;
}

// ===== MOVEMENT =====
function moveBall(){
  if(timeStopped) return;

  let factor = slowMotion ? 0.4 : 1;

  ball.x += ball.speedX * factor;
  ball.y += ball.speedY * factor;

  if(ball.x<0||ball.x>canvas.width) ball.speedX*=-1;
  if(ball.y<0) ball.speedY*=-1;

  // PADDLE HIT WITH ANGLE
  if(
    ball.y+ball.radius>paddle.y &&
    ball.x>paddle.x &&
    ball.x<paddle.x+paddle.width
  ){
    let hit=(ball.x-(paddle.x+paddle.width/2))/(paddle.width/2);
    let angle=hit*(Math.PI/3);

    let speed=Math.sqrt(ball.speedX**2+ball.speedY**2);

    ball.speedX=speed*Math.sin(angle);
    ball.speedY=-Math.abs(speed*Math.cos(angle));

    increaseSpeed();
    triggerSlowMotion();

    if(bricksCleared){
      resetBricks();
      bricksCleared=false;
    }
  }

  if(ball.y>canvas.height){
    lives--;
    if(lives<=0) gameOver=true;
  }
}

// ===== BRICK COLLISION =====
function brickCollision(){
  if(timeStopped) return;

  for(let r=0;r<brickInfo.rows;r++){
    for(let c=0;c<brickInfo.cols;c++){
      let b=bricks[r][c];

      if(
        b.visible &&
        ball.x>b.x &&
        ball.x<b.x+brickInfo.width &&
        ball.y>b.y &&
        ball.y<b.y+brickInfo.height
      ){
        ball.speedY*=-1;
        increaseSpeed();
        triggerSlowMotion();

        b.visible=false;
        score++;

        if(score%(brickInfo.rows*brickInfo.cols)===0){
          bricksCleared=true;
        }
      }
    }
  }
}

// ===== DRAW =====
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPaddle();
  drawBall();
  drawBricks();

  ctx.fillText("Score: "+score,20,20);

  if(!gameOver){
    moveBall();
    brickCollision();
    requestAnimationFrame(draw);
  } else {
    ctx.fillText("GAME OVER",350,250);
  }
}

// ===== INPUT =====
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") paddle.dx=paddle.speed;
  if(e.key==="ArrowLeft") paddle.dx=-paddle.speed;
  if(e.key==="z") activateZaWarudo();
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowRight"||e.key==="ArrowLeft") paddle.dx=0;
});

// paddle movement loop
setInterval(()=>{
  paddle.x+=paddle.dx;
  if(paddle.x<0) paddle.x=0;
  if(paddle.x+paddle.width>canvas.width)
    paddle.x=canvas.width-paddle.width;
},16);

draw();
</script>

</body>
</html>
