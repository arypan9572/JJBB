<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breakout Starter</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: filter 0.3s ease;
    }

    h1 { margin-bottom: 10px; }

    canvas {
      background: black;
      border: 3px solid white;
    }

    .instructions {
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
      max-width: 500px;
    }

    .za-warudo {
      filter: grayscale(1) contrast(1.4) brightness(0.7);
    }

    /* ZA WARUDO TEXT */
    #zaText {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      font-size: 80px;
      font-weight: bold;
      color: rgba(255, 200, 50, 0.9);
      text-shadow: 
        0 0 10px rgba(255,200,50,0.8),
        0 0 20px rgba(255,100,200,0.6),
        0 0 30px rgba(0,150,255,0.6);
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes zaEcho {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      20% { opacity: 1; }
      60% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
    }

    /* 💥 BITES THE DUST EFFECT */
    .bites-effect {
      animation: bitesPulse 0.4s infinite;
    }

    @keyframes bitesPulse {
      0% { filter: hue-rotate(0deg) brightness(1); }
      50% { filter: hue-rotate(260deg) brightness(1.4); }
      100% { filter: hue-rotate(0deg) brightness(1); }
    }
  </style>
</head>

<body>
  <h1>Breakout Starter Game</h1>
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <div id="zaText">ZA WARUDO</div>

  <div class="instructions">
    Arrow keys to move • Press Z = ZA WARUDO • Press X = BITES THE DUST
  </div>

  <audio id="zaWarudoSound" src="zawarudo.mp3"></audio>
  <audio id="tomattaSound" src="tomatta.mp3"></audio>
  <audio id="timeResumeSound" src="time resumes.mp3"></audio>
  <audio id="bitesSound" src="bites.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const zaWarudoSound = document.getElementById("zaWarudoSound");
const tomattaSound = document.getElementById("tomattaSound");
const timeResumeSound = document.getElementById("timeResumeSound");
const bitesSound = document.getElementById("bitesSound");

const zaText = document.getElementById("zaText");

let timeStopped = false;
let bitesActive = false;
let rewinding = false;

// =====================
// HISTORY SYSTEM
// =====================
let ballHistory = [];
const MAX_HISTORY = 500;

// =====================
// REWIND CONTROL
// =====================
let rewindStart = 0;
let rewindDuration = 8000; // 8 seconds
let rewindStartTime = 0;

let highlightPoints = [];

// =====================
// EASING (slow → fast → slow)
// =====================
function easeInOutCubic(t) {
  return t < 0.5
    ? 4 * t * t * t
    : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// =====================
// RANDOM ANGLE
// =====================
function randomAngle() {
  const angle = (Math.random() * Math.PI / 2) + Math.PI / 4;
  const speed = 4;
  return {
    x: Math.cos(angle) * speed * (Math.random() < 0.5 ? 1 : -1),
    y: -Math.abs(Math.sin(angle) * speed)
  };
}

// =====================
// BITES THE DUST
// =====================
function activateBites() {
  if (bitesActive || timeStopped) return;

  bitesActive = true;
  rewinding = true;

  bitesSound.currentTime = 0;
  bitesSound.play().catch(()=>{});

  document.body.classList.add("bites-effect");

  // pick highlight points
  highlightPoints = [];
  for (let i = 0; i < 8; i++) {
    highlightPoints.push(Math.floor(Math.random() * ballHistory.length));
  }

  rewindStart = performance.now();
  rewindStartTime = rewindStart;

  setTimeout(() => {
    document.body.classList.remove("bites-effect");

    const newAngle = randomAngle();
    ball.x = canvas.width / 2;
    ball.y = canvas.height - 50;
    ball.speedX = newAngle.x;
    ball.speedY = newAngle.y;

    rewinding = false;
    bitesActive = false;
    ballHistory = [];
    highlightPoints = [];

  }, rewindDuration);
}

// =====================
// PADDLE
// =====================
const paddle = {
  width: 120,
  height: 15,
  x: canvas.width / 2 - 60,
  y: canvas.height - 30,
  speed: 8,
  dx: 0
};

// =====================
// BALL
// =====================
const start = randomAngle();

const ball = {
  x: canvas.width / 2,
  y: canvas.height - 50,
  radius: 10,
  speedX: start.x,
  speedY: start.y
};

// =====================
// DRAW
// =====================
function drawPaddle() {
  ctx.fillStyle = "white";
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();
}

// 🔴 FULL SIZE HISTORY TRAIL (SMOOTH FADE)
function drawTrail() {
  for (let i = 0; i < ballHistory.length; i++) {
    const p = ballHistory[i];
    const alpha = i / ballHistory.length;

    ctx.beginPath();
    ctx.arc(p.x, p.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,165,0,${alpha * 0.25})`;
    ctx.fill();
  }
}

// 🔴 BIG HIGHLIGHTS (EXACT POSITIONS)
function drawHighlights() {
  ctx.fillStyle = "red";

  highlightPoints.forEach(i => {
    const p = ballHistory[i];
    if (!p) return;

    ctx.beginPath();
    ctx.arc(p.x, p.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();
  });
}

// =====================
// MOVEMENT
// =====================
function movePaddle() {
  paddle.x += paddle.dx;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
}

// =====================
// NORMAL BALL MOVEMENT
// =====================
function moveBall() {
  if (timeStopped || bitesActive) return;

  ball.x += ball.speedX;
  ball.y += ball.speedY;

  // slow speed increase
  ball.speedX *= 1.0005;
  ball.speedY *= 1.0005;

  // walls
  if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0)
    ball.speedX *= -1;

  if (ball.y - ball.radius < 0)
    ball.speedY *= -1;

  // paddle
  if (
    ball.y + ball.radius > paddle.y &&
    ball.x > paddle.x &&
    ball.x < paddle.x + paddle.width
  ) {
    ball.speedY *= -1;
  }

  // save history (VERY IMPORTANT)
  ballHistory.push({ x: ball.x, y: ball.y });

  if (ballHistory.length > MAX_HISTORY) {
    ballHistory.shift();
  }
}

// =====================
// SMOOTH REWIND SYSTEM
// =====================
function rewindBall() {
  if (!rewinding) return;

  const now = performance.now();
  const t = Math.min((now - rewindStartTime) / rewindDuration, 1);

  // slow → fast → slow curve
  const eased = easeInOutCubic(t);

  // reverse progress (1 → 0)
  const reverseT = 1 - eased;

  const indexFloat = reverseT * (ballHistory.length - 1);

  const i = Math.floor(indexFloat);
  const next = Math.min(i + 1, ballHistory.length - 1);

  const p1 = ballHistory[i];
  const p2 = ballHistory[next];

  if (p1 && p2) {
    const lerp = indexFloat - i;

    ball.x = p1.x + (p2.x - p1.x) * lerp;
    ball.y = p1.y + (p2.y - p1.y) * lerp;
  }

  // remove highlights once reached
  highlightPoints = highlightPoints.filter(h => h < i);
}

// =====================
// INPUT
// =====================
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") paddle.dx = paddle.speed;
  if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
  if (e.key.toLowerCase() === "x") activateBites();
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowLeft") paddle.dx = 0;
});

// =====================
// MAIN LOOP
// =====================
function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawPaddle();

  if (rewinding) {
    drawHighlights();
    rewindBall();
    drawBall();
  } else {
    movePaddle();
    moveBall();
    drawTrail();
    drawBall();
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
