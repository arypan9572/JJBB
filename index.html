<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breakout Starter</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: filter 0.3s ease;
    }

    h1 { margin-bottom: 10px; }

    canvas {
      background: black;
      border: 3px solid white;
    }

    .instructions {
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
      max-width: 500px;
    }

    .za-warudo {
      filter: grayscale(1) contrast(1.4) brightness(0.7);
    }

    /* ZA WARUDO TEXT */
    #zaText {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      font-size: 80px;
      font-weight: bold;
      color: rgba(255, 200, 50, 0.9);
      text-shadow: 
        0 0 10px rgba(255,200,50,0.8),
        0 0 20px rgba(255,100,200,0.6),
        0 0 30px rgba(0,150,255,0.6);
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes zaEcho {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      20% { opacity: 1; }
      60% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
    }

    /* 💥 BITES THE DUST EFFECT */
    .bites-effect {
      animation: bitesPulse 0.4s infinite;
    }

    @keyframes bitesPulse {
      0% { filter: hue-rotate(0deg) brightness(1); }
      50% { filter: hue-rotate(260deg) brightness(1.4); }
      100% { filter: hue-rotate(0deg) brightness(1); }
    }
  </style>
</head>

<body>
  <h1>Breakout Starter Game</h1>
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <div id="zaText">ZA WARUDO</div>

  <div class="instructions">
    Arrow keys to move • Press Z = ZA WARUDO • Press X = BITES THE DUST
  </div>

  <audio id="zaWarudoSound" src="zawarudo.mp3"></audio>
  <audio id="tomattaSound" src="tomatta.mp3"></audio>
  <audio id="timeResumeSound" src="time resumes.mp3"></audio>
  <audio id="bitesSound" src="bites.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const zaWarudoSound = document.getElementById("zaWarudoSound");
const tomattaSound = document.getElementById("tomattaSound");
const timeResumeSound = document.getElementById("timeResumeSound");
const bitesSound = document.getElementById("bitesSound");

const zaText = document.getElementById("zaText");

let timeStopped = false;
let bitesActive = false;
let rewinding = false;

let ballHistory = [];
let rewindIndex = 0;
let rewindProgress = 0;

let highlightPoints = [];

function activateBites() {
  if (bitesActive || timeStopped) return;

  bitesActive = true;
  rewinding = true;

  bitesSound.currentTime = 0;
  bitesSound.play().catch(()=>{});

  document.body.classList.add("bites-effect");

  // pick random highlight points
  highlightPoints = [];
  for (let i = 0; i < 6; i++) {
    highlightPoints.push(
      Math.floor(Math.random() * ballHistory.length)
    );
  }

  rewindIndex = ballHistory.length - 1;
  rewindProgress = 0;

  setTimeout(() => {
    document.body.classList.remove("bites-effect");

    // reset ball at end
    const newAngle = randomAngle();
    ball.x = canvas.width / 2;
    ball.y = canvas.height - 50;
    ball.speedX = newAngle.x;
    ball.speedY = newAngle.y;

    rewinding = false;
    bitesActive = false;
    ballHistory = [];
  }, 8000);
}

function randomAngle() {
  const angle = (Math.random() * Math.PI / 2) + Math.PI / 4;
  const speed = 4;
  return {
    x: Math.cos(angle) * speed * (Math.random() < 0.5 ? 1 : -1),
    y: -Math.abs(Math.sin(angle) * speed)
  };
}

const paddle = {
  width: 120,
  height: 15,
  x: canvas.width / 2 - 60,
  y: canvas.height - 30,
  speed: 8,
  dx: 0
};

const start = randomAngle();

const ball = {
  x: canvas.width / 2,
  y: canvas.height - 50,
  radius: 10,
  speedX: start.x,
  speedY: start.y
};

const brickInfo = {
  rows: 4,
  cols: 8,
  width: 85,
  height: 25,
  padding: 10,
  offsetTop: 50,
  offsetLeft: 20
};

let score = 0;
let lives = 3;
let gameOver = false;

const bricks = [];

for (let r = 0; r < brickInfo.rows; r++) {
  bricks[r] = [];
  for (let c = 0; c < brickInfo.cols; c++) {
    bricks[r][c] = { x: 0, y: 0, visible: true };
  }
}

function drawPaddle() {
  ctx.fillStyle = "white";
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
}

let trail = [];

function drawBall() {
  trail.push({ x: ball.x, y: ball.y });
  if (trail.length > 6) trail.shift();

  for (let i = 0; i < trail.length; i++) {
    ctx.beginPath();
    ctx.arc(trail[i].x, trail[i].y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,165,0,${i / trail.length})`;
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();
}

// 🔴 draw highlighted rewind points
function drawHighlights() {
  ctx.fillStyle = "red";
  highlightPoints.forEach(i => {
    const p = ballHistory[i];
    if (p) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawBricks() {
  for (let r = 0; r < brickInfo.rows; r++) {
    for (let c = 0; c < brickInfo.cols; c++) {
      const brick = bricks[r][c];
      if (brick.visible) {
        const brickX = c * (brickInfo.width + brickInfo.padding) + brickInfo.offsetLeft;
        const brickY = r * (brickInfo.height + brickInfo.padding) + brickInfo.offsetTop;

        brick.x = brickX;
        brick.y = brickY;

        ctx.fillStyle = "deepskyblue";
        ctx.fillRect(brickX, brickY, brickInfo.width, brickInfo.height);
      }
    }
  }
}

function drawScore() {
  ctx.fillStyle = "white";
  ctx.fillText("Score: " + score, 20, 30);
}

function drawLives() {
  ctx.fillStyle = "white";
  ctx.fillText("Lives: " + lives, canvas.width - 100, 30);
}

function drawMessage() {
  ctx.textAlign = "center";
  ctx.font = "40px Arial";
  ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
}

function movePaddle() {
  paddle.x += paddle.dx;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
}

function rewindBall() {
  if (!rewinding) return;

  // easing (slow → fast → slow)
  const t = rewindIndex / ballHistory.length;
  const speedFactor = 0.5 + Math.sin(t * Math.PI) * 2;

  rewindProgress += speedFactor;

  if (rewindIndex >= 1) {
    const current = ballHistory[Math.floor(rewindIndex)];
    const next = ballHistory[Math.floor(rewindIndex - 1)];

    if (current && next) {
      ball.x = current.x + (next.x - current.x) * 0.2;
      ball.y = current.y + (next.y - current.y) * 0.2;
    }

    // remove highlights when reached
    highlightPoints = highlightPoints.filter(i => i < rewindIndex);

    rewindIndex -= speedFactor * 0.1;
  }
}

function moveBall() {
  if (timeStopped || bitesActive) return;

  // store history
  ballHistory.push({ x: ball.x, y: ball.y });
  if (ballHistory.length > 300) ballHistory.shift();

  ball.x += ball.speedX;
  ball.y += ball.speedY;

  ball.speedX *= 1.0005;
  ball.speedY *= 1.0005;

  if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0)
    ball.speedX *= -1;

  if (ball.y - ball.radius < 0)
    ball.speedY *= -1;

  if (
    ball.y + ball.radius > paddle.y &&
    ball.x > paddle.x &&
    ball.x < paddle.x + paddle.width
  ) {
    ball.speedY *= -1;
  }

  if (ball.y + ball.radius > canvas.height) {
    lives--;

    if (lives <= 0) {
      gameOver = true;
    } else {
      const newAngle = randomAngle();
      ball.x = canvas.width / 2;
      ball.y = canvas.height - 50;
      ball.speedX = newAngle.x;
      ball.speedY = newAngle.y;
    }
  }
}

function brickCollision() {
  if (timeStopped || bitesActive) return;

  for (let r = 0; r < brickInfo.rows; r++) {
    for (let c = 0; c < brickInfo.cols; c++) {
      const brick = bricks[r][c];

      if (brick.visible &&
          ball.x > brick.x &&
          ball.x < brick.x + brickInfo.width &&
          ball.y > brick.y &&
          ball.y < brick.y + brickInfo.height) {

        ball.speedY *= -1;
        brick.visible = false;
        score++;
      }
    }
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") paddle.dx = paddle.speed;
  if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
  if (e.key.toLowerCase() === "x") activateBites();
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowLeft") paddle.dx = 0;
});

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawPaddle();
  drawBall();
  drawBricks();
  drawScore();
  drawLives();

  if (rewinding) {
    drawHighlights();
    rewindBall();
  } else if (!gameOver) {
    movePaddle();
    moveBall();
    brickCollision();
  } else {
    drawMessage();
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
