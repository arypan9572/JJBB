<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Breakout Starter</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    transition: filter 0.2s ease;
  }

  h1 { margin-bottom: 10px; }

  canvas {
    background: black;
    border: 3px solid white;
  }

  .instructions {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
    max-width: 500px;
  }

  /* ZA WARUDO EFFECT */
  .za-warudo {
    filter: grayscale(1) contrast(1.5) brightness(0.6) blur(2px);
  }

  .freeze-flash {
    animation: flash 0.5s ease;
  }

  @keyframes flash {
    0% { filter: brightness(2) blur(6px); }
    100% { filter: grayscale(1) contrast(1.5) brightness(0.6) blur(2px); }
  }
</style>
</head>

<body>
<h1>Breakout Starter Game</h1>
<canvas id="gameCanvas" width="800" height="500"></canvas>

<div class="instructions">
Arrow keys to move • Press Z to activate ZA WARUDO
</div>

<audio id="zaWarudoSound" src="zawarudo.mp3" preload="auto"></audio>
<audio id="timeResumeSound" src="time resumes.mp3" preload="auto"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const zaWarudoSound = document.getElementById("zaWarudoSound");
const timeResumeSound = document.getElementById("timeResumeSound");

let timeStopped = false;
let originalSpeed = null;

// =========================
// AUDIO UNLOCK
// =========================
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;

  zaWarudoSound.play().then(() => {
    zaWarudoSound.pause();
    zaWarudoSound.currentTime = 0;
    audioUnlocked = true;
  }).catch(() => {});
}

window.addEventListener("click", unlockAudio, { once: true });
window.addEventListener("keydown", unlockAudio, { once: true });

// =========================
// ZA WARUDO EFFECT
// =========================
function activateZaWarudo() {
  if (timeStopped) return;

  timeStopped = true;
  document.body.classList.add("za-warudo", "freeze-flash");

  // save speed
  originalSpeed = {
    x: ball.speedX,
    y: ball.speedY
  };

  zaWarudoSound.currentTime = 0;
  zaWarudoSound.play().catch(() => {});

  // =========================
  // 0.5s smooth slowdown
  // =========================
  const duration = 500;
  const startX = ball.speedX;
  const startY = ball.speedY;
  const start = performance.now();

  function slow(now) {
    let t = Math.min((now - start) / duration, 1);

    ball.speedX = startX * (1 - t);
    ball.speedY = startY * (1 - t);

    if (t < 1) {
      requestAnimationFrame(slow);
    } else {
      ball.speedX = 0;
      ball.speedY = 0;
    }
  }

  requestAnimationFrame(slow);

  // =========================
  // SOUND at 5.8s
  // =========================
  setTimeout(() => {
    timeResumeSound.currentTime = 0;
    timeResumeSound.play().catch(() => {});
  }, 5800);

  // =========================
  // END TIME STOP
  // =========================
  setTimeout(() => {
    timeStopped = false;
    document.body.classList.remove("za-warudo", "freeze-flash");

    // restore speed properly
    ball.speedX = originalSpeed.x;
    ball.speedY = originalSpeed.y;

    originalSpeed = null;
  }, 8000);
}

// =========================
// GAME OBJECTS
// =========================
const paddle = {
  width: 120,
  height: 15,
  x: 340,
  y: 470,
  speed: 8,
  dx: 0
};

const ball = {
  x: 400,
  y: 400,
  radius: 10,
  speedX: 4,
  speedY: -4
};

// =========================
// GAME LOGIC
// =========================
function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();
}

function drawPaddle() {
  ctx.fillStyle = "white";
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
}

function moveBall() {
  if (timeStopped) return;

  ball.x += ball.speedX;
  ball.y += ball.speedY;

  if (ball.x < 0 || ball.x > canvas.width) ball.speedX *= -1;
  if (ball.y < 0) ball.speedY *= -1;

  if (
    ball.y + ball.radius > paddle.y &&
    ball.x > paddle.x &&
    ball.x < paddle.x + paddle.width
  ) {
    ball.speedY *= -1;
  }
}

function movePaddle() {
  paddle.x += paddle.dx;

  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x + paddle.width > canvas.width)
    paddle.x = canvas.width - paddle.width;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBall();
  drawPaddle();

  moveBall();
  movePaddle();

  requestAnimationFrame(draw);
}

draw();

// =========================
// CONTROLS
// =========================
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
  if (e.key === "ArrowRight") paddle.dx = paddle.speed;
  if (e.key.toLowerCase() === "z") activateZaWarudo();
});

document.addEventListener("keyup", (e) => {
  if (e.key === "ArrowLeft" || e.key === "ArrowRight")
    paddle.dx = 0;
});
</script>
</body>
</html>
