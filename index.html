<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breakout Starter</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    canvas {
      background: black;
      border: 3px solid white;
    }

    #bitesImg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 0.2s ease;
    }

    .show-bites {
      opacity: 1 !important;
    }
  </style>
</head>

<body>
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <!-- BITES THE DUST IMAGE -->
  <img id="bitesImg" src="bites.png" />

  <audio id="bitesSound" src="bites.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const bitesSound = document.getElementById("bitesSound");
const bitesImg = document.getElementById("bitesImg");

let rewinding = false;

// =====================
// HISTORY SYSTEM
// =====================
let ballHistory = [];
const MAX_HISTORY = 600;

let rewindStartTime = 0;
const rewindDuration = 8000;

// =====================
// EASING
// =====================
function easeInOutCubic(t) {
  return t < 0.5
    ? 4 * t * t * t
    : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// =====================
// RANDOM ANGLE
// =====================
function randomAngle() {
  const angle = (Math.random() * Math.PI / 2) + Math.PI / 4;
  const speed = 4;
  return {
    x: Math.cos(angle) * speed * (Math.random() < 0.5 ? 1 : -1),
    y: -Math.abs(Math.sin(angle) * speed)
  };
}

// =====================
// BITES THE DUST (REPLACED)
// =====================
function activateBites() {
  if (rewinding) return;

  rewinding = true;
  rewindStartTime = performance.now();

  bitesSound.currentTime = 0;
  bitesSound.play().catch(()=>{});

  bitesImg.classList.add("show-bites");

  setTimeout(() => {
    const newAngle = randomAngle();
    ball.x = canvas.width / 2;
    ball.y = canvas.height - 50;
    ball.speedX = newAngle.x;
    ball.speedY = newAngle.y;

    ballHistory = [];
    rewinding = false;
    bitesImg.classList.remove("show-bites");
  }, rewindDuration);
}

// =====================
// PADDLE
// =====================
const paddle = {
  width: 120,
  height: 15,
  x: canvas.width / 2 - 60,
  y: canvas.height - 30,
  speed: 8,
  dx: 0
};

// =====================
// BALL
// =====================
const start = randomAngle();

const ball = {
  x: canvas.width / 2,
  y: canvas.height - 50,
  radius: 10,
  speedX: start.x,
  speedY: start.y
};

// =====================
// DRAW
// =====================
function drawPaddle() {
  ctx.fillStyle = "white";
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();
}

// trail
function drawTrail() {
  for (let i = 0; i < ballHistory.length; i++) {
    const p = ballHistory[i];
    const a = i / ballHistory.length;
    ctx.beginPath();
    ctx.arc(p.x, p.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,165,0,${a * 0.3})`;
    ctx.fill();
  }
}

// =====================
// MOVEMENT
// =====================
function movePaddle() {
  paddle.x += paddle.dx;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
}

function moveBall() {
  if (rewinding) return;

  ball.x += ball.speedX;
  ball.y += ball.speedY;

  ball.speedX *= 1.0005;
  ball.speedY *= 1.0005;

  if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0)
    ball.speedX *= -1;

  if (ball.y - ball.radius < 0)
    ball.speedY *= -1;

  if (
    ball.y + ball.radius > paddle.y &&
    ball.x > paddle.x &&
    ball.x < paddle.x + paddle.width
  ) {
    ball.speedY *= -1;
  }

  ballHistory.push({ x: ball.x, y: ball.y });

  if (ballHistory.length > MAX_HISTORY) {
    ballHistory.shift();
  }
}

// =====================
// REWIND SYSTEM
// =====================
function rewindBall() {
  if (!rewinding) return;

  const t = (performance.now() - rewindStartTime) / rewindDuration;
  const eased = easeInOutCubic(Math.min(t, 1));
  const reverse = 1 - eased;

  const index = Math.floor(reverse * (ballHistory.length - 1));
  const next = Math.min(index + 1, ballHistory.length - 1);

  const p1 = ballHistory[index];
  const p2 = ballHistory[next];

  if (p1 && p2) {
    const lerp = reverse * (ballHistory.length - 1) - index;
    ball.x = p1.x + (p2.x - p1.x) * lerp;
    ball.y = p1.y + (p2.y - p1.y) * lerp;
  }
}

// =====================
// INPUT
// =====================
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") paddle.dx = paddle.speed;
  if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
  if (e.key.toLowerCase() === "x") activateBites();
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowLeft") paddle.dx = 0;
});

// =====================
// LOOP
// =====================
function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawPaddle();

  if (rewinding) {
    rewindBall();
    drawBall();
  } else {
    movePaddle();
    moveBall();
    drawTrail();
    drawBall();
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
