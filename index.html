<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breakout Starter</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: filter 0.3s ease;
    }

    h1 { margin-bottom: 10px; }

    canvas {
      background: black;
      border: 3px solid white;
    }

    .instructions {
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
      max-width: 500px;
    }

    .za-warudo {
      filter: grayscale(1) contrast(1.4) brightness(0.7);
    }

    /* ===== COOLDOWN BAR (ROUNDED FIX) ===== */
    #cooldownBar {
      width: 300px;
      height: 12px;
      border: 2px solid white;
      margin-top: 10px;
      position: relative;
      border-radius: 999px;
      overflow: hidden;
    }

    #cooldownFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, purple, cyan);
      transition: width 0.2s linear;
    }
  </style>
</head>

<body>
  <h1>Breakout Starter Game</h1>

  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <div class="instructions">
    Arrow keys to move • Press Z to activate ZA WARUDO
  </div>

  <!-- COOLDOWN BAR -->
  <div id="cooldownBar">
    <div id="cooldownFill"></div>
  </div>

  <audio id="zaWarudoSound" src="zawarudo.mp3" preload="auto"></audio>
  <audio id="timeResumeSound" src="time resumes.mp3" preload="auto"></audio>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const zaWarudoSound = document.getElementById("zaWarudoSound");
    const timeResumeSound = document.getElementById("timeResumeSound");
    const cooldownFill = document.getElementById("cooldownFill");

    let timeStopped = false;

    let cooldown = 100;
    let canUsePower = true;

    // 🔥 FIX: pause cooldown during timestop
    let cooldownPaused = false;

    function updateCooldown() {
      if (!cooldownPaused && cooldown < 100) {
        cooldown += 0.3;

        if (cooldown >= 100) {
          cooldown = 100;
          canUsePower = true;
        }
      }

      cooldownFill.style.width = cooldown + "%";
      requestAnimationFrame(updateCooldown);
    }
    updateCooldown();

    let savedBallSpeedX = 0;
    let savedBallSpeedY = 0;

    function activateZaWarudo() {
      if (timeStopped || !canUsePower) return;

      timeStopped = true;
      canUsePower = false;
      cooldown = 0;
      cooldownPaused = true; // 🔥 FIX

      document.body.classList.add("za-warudo");

      zaWarudoSound.currentTime = 0;
      zaWarudoSound.play().catch(() => {});

      savedBallSpeedX = ball.speedX;
      savedBallSpeedY = ball.speedY;

      const startX = ball.speedX;
      const startY = ball.speedY;
      const start = performance.now();

      function slowDown(now) {
        const t = Math.min((now - start) / 500, 1);

        ball.speedX = startX * (1 - t);
        ball.speedY = startY * (1 - t);

        if (t < 1) requestAnimationFrame(slowDown);
        else {
          ball.speedX = 0;
          ball.speedY = 0;
        }
      }

      requestAnimationFrame(slowDown);

      setTimeout(() => {
        timeResumeSound.currentTime = 0;
        timeResumeSound.play().catch(() => {});
      }, 5800);

      setTimeout(() => {
        timeStopped = false;
        cooldownPaused = false; // 🔥 FIX UNPAUSE
        ball.speedX = savedBallSpeedX;
        ball.speedY = savedBallSpeedY;
        document.body.classList.remove("za-warudo");
      }, 8000);
    }

    /* ===== REST OF GAME (UNCHANGED EXCEPT PADDLE FIX) ===== */

    const paddle = {
      width: 120,
      height: 15,
      x: canvas.width / 2 - 60,
      y: canvas.height - 30,
      speed: 8,
      dx: 0
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height - 50,
      radius: 10,
      speedX: 4,
      speedY: -4
    };

    function drawPaddle() {
      ctx.fillStyle = "white";
      ctx.beginPath();

      const r = 10;

      ctx.moveTo(paddle.x + r, paddle.y);
      ctx.lineTo(paddle.x + paddle.width - r, paddle.y);
      ctx.quadraticCurveTo(paddle.x + paddle.width, paddle.y, paddle.x + paddle.width, paddle.y + r);
      ctx.lineTo(paddle.x + paddle.width, paddle.y + paddle.height - r);
      ctx.quadraticCurveTo(paddle.x + paddle.width, paddle.y + paddle.height, paddle.x + paddle.width - r, paddle.y + paddle.height);
      ctx.lineTo(paddle.x + r, paddle.y + paddle.height);
      ctx.quadraticCurveTo(paddle.x, paddle.y + paddle.height, paddle.x, paddle.y + paddle.height - r);
      ctx.lineTo(paddle.x, paddle.y + r);
      ctx.quadraticCurveTo(paddle.x, paddle.y, paddle.x + r, paddle.y);

      ctx.fill();
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = "orange";
      ctx.fill();
    }

    function movePaddle() {
      paddle.x += paddle.dx;
    }

    function moveBall() {
      if (timeStopped) return;

      ball.x += ball.speedX;
      ball.y += ball.speedY;

      if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0)
        ball.speedX *= -1;

      if (ball.y - ball.radius < 0)
        ball.speedY *= -1;

      if (
        ball.y + ball.radius > paddle.y &&
        ball.x > paddle.x &&
        ball.x < paddle.x + paddle.width
      ) {
        ball.speedY *= -1;
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowRight") paddle.dx = paddle.speed;
      if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
      if (e.key.toLowerCase() === "z") activateZaWarudo();
    });

    document.addEventListener("keyup", e => {
      if (e.key.includes("Arrow")) paddle.dx = 0;
    });

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);

      drawPaddle();
      drawBall();

      movePaddle();
      moveBall();

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
