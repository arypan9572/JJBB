<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breakout Starter</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: filter 0.3s ease;
    }

    h1 { margin-bottom: 10px; }

    canvas {
      background: black;
      border: 3px solid white;
    }

    .instructions {
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
      max-width: 500px;
    }

    .za-warudo {
      filter: grayscale(1) contrast(1.4) brightness(0.7);
    }

    #zaText {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      font-size: 80px;
      font-weight: bold;
      color: rgba(255, 200, 50, 0.9);
      text-shadow: 
        0 0 10px rgba(255,200,50,0.8),
        0 0 20px rgba(255,100,200,0.6),
        0 0 30px rgba(0,150,255,0.6);
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes zaEcho {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      20% { opacity: 1; }
      60% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
    }

    .bites-effect {
      animation: bitesPulse 0.4s infinite;
    }

    @keyframes bitesPulse {
      0% { filter: hue-rotate(0deg) brightness(1); }
      50% { filter: hue-rotate(260deg) brightness(1.4); }
      100% { filter: hue-rotate(0deg) brightness(1); }
    }
  </style>
</head>

<body>
  <h1>Breakout Starter Game</h1>
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <div id="zaText">ZA WARUDO</div>

  <div class="instructions">
    Arrow keys to move • Press Z = ZA WARUDO • Press X = BITES THE DUST
  </div>

  <audio id="zaWarudoSound" src="zawarudo.mp3"></audio>
  <audio id="tomattaSound" src="tomatta.mp3"></audio>
  <audio id="timeResumeSound" src="time resumes.mp3"></audio>
  <audio id="bitesSound" src="bites.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const zaWarudoSound = document.getElementById("zaWarudoSound");
const tomattaSound = document.getElementById("tomattaSound");
const timeResumeSound = document.getElementById("timeResumeSound");
const bitesSound = document.getElementById("bitesSound");

const zaText = document.getElementById("zaText");

let timeStopped = false;
let bitesActive = false;

/* =========================
   BITES THE DUST (NEW)
========================= */
let rewinding = false;
let ballHistory = [];
let rewindStartTime = 0;
let rewindDuration = 8000;
let highlightPoints = [];

function easeInOutCubic(t) {
  return t < 0.5
    ? 4 * t * t * t
    : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function activateBites() {
  if (bitesActive || timeStopped) return;

  bitesActive = true;
  rewinding = true;

  savedBallSpeedX = ball.speedX;
  savedBallSpeedY = ball.speedY;

  ball.speedX = 0;
  ball.speedY = 0;

  bitesSound.currentTime = 0;
  bitesSound.play().catch(()=>{});

  document.body.classList.add("bites-effect");

  highlightPoints = [];
  for (let i = 0; i < 8; i++) {
    highlightPoints.push(Math.floor(Math.random() * ballHistory.length));
  }

  rewindStartTime = performance.now();

  setTimeout(() => {
    document.body.classList.remove("bites-effect");

    const newAngle = randomAngle();
    ball.x = canvas.width / 2;
    ball.y = canvas.height - 50;
    ball.speedX = newAngle.x;
    ball.speedY = newAngle.y;

    rewinding = false;
    bitesActive = false;
    ballHistory = [];
    highlightPoints = [];
  }, rewindDuration);
}

/* =========================
   ZA WARUDO (UNCHANGED)
========================= */
let savedBallSpeedX = 0;
let savedBallSpeedY = 0;
let bricksCleared = false;

function activateZaWarudo() {
  if (timeStopped || bitesActive) return;

  timeStopped = true;
  document.body.classList.add("za-warudo");

  savedBallSpeedX = ball.speedX;
  savedBallSpeedY = ball.speedY;

  const startSpeedX = ball.speedX;
  const startSpeedY = ball.speedY;
  const start = performance.now();

  function slowDownStep(now) {
    const t = Math.min((now - start) / 500, 1);
    ball.speedX = startSpeedX * (1 - t);
    ball.speedY = startSpeedY * (1 - t);

    if (t < 1) requestAnimationFrame(slowDownStep);
    else {
      ball.speedX = 0;
      ball.speedY = 0;
    }
  }

  requestAnimationFrame(slowDownStep);

  setTimeout(() => {
    (Math.random() < 0.5 ? zaWarudoSound : tomattaSound).play();

    setTimeout(() => {
      zaText.style.animation = "none";
      void zaText.offsetWidth;
      zaText.style.animation = "zaEcho 1.5s ease-out";
    }, 670);
  }, 100);

  setTimeout(() => timeResumeSound.play(), 5700);

  setTimeout(() => {
    timeStopped = false;
    ball.speedX = savedBallSpeedX;
    ball.speedY = savedBallSpeedY;
    document.body.classList.remove("za-warudo");
  }, 8000);
}

/* =========================
   REST OF GAME (UNCHANGED)
========================= */

const paddle = {
  width: 120,
  height: 15,
  x: 340,
  y: 470,
  speed: 8,
  dx: 0
};

function randomAngle() {
  const angle = (Math.random() * Math.PI / 2) + Math.PI / 4;
  const speed = 4;
  return {
    x: Math.cos(angle) * speed * (Math.random() < 0.5 ? 1 : -1),
    y: -Math.abs(Math.sin(angle) * speed)
  };
}

const start = randomAngle();

const ball = {
  x: canvas.width / 2,
  y: canvas.height - 50,
  radius: 10,
  speedX: start.x,
  speedY: start.y
};

let score = 0;
let lives = 3;
let gameOver = false;

/* =========================
   MOVEMENT + HISTORY
========================= */
function movePaddle() {
  paddle.x += paddle.dx;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
}

function moveBall() {
  if (timeStopped || bitesActive) return;

  ball.x += ball.speedX;
  ball.y += ball.speedY;

  ball.speedX *= 1.0005;
  ball.speedY *= 1.0005;

  if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0)
    ball.speedX *= -1;

  if (ball.y - ball.radius < 0)
    ball.speedY *= -1;

  ballHistory.push({ x: ball.x, y: ball.y });
  if (ballHistory.length > 500) ballHistory.shift();
}

/* =========================
   REWIND
========================= */
function rewindBall() {
  if (!rewinding) return;

  const t = Math.min((performance.now() - rewindStartTime) / rewindDuration, 1);
  const eased = easeInOutCubic(t);
  const reverseT = 1 - eased;

  const indexFloat = reverseT * (ballHistory.length - 1);
  const i = Math.floor(indexFloat);
  const next = Math.min(i + 1, ballHistory.length - 1);

  const p1 = ballHistory[i];
  const p2 = ballHistory[next];

  if (p1 && p2) {
    const lerp = indexFloat - i;
    ball.x = p1.x + (p2.x - p1.x) * lerp;
    ball.y = p1.y + (p2.y - p1.y) * lerp;
  }

  highlightPoints = highlightPoints.filter(h => h < i);
}

/* =========================
   DRAW
========================= */
function drawPaddle() {
  ctx.fillStyle = "white";
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();
}

function drawTrail() {
  for (let i = 0; i < ballHistory.length; i++) {
    const p = ballHistory[i];
    ctx.beginPath();
    ctx.arc(p.x, p.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,165,0,${i / ballHistory.length * 0.3})`;
    ctx.fill();
  }
}

function drawHighlights() {
  ctx.fillStyle = "red";
  highlightPoints.forEach(i => {
    const p = ballHistory[i];
    if (!p) return;
    ctx.beginPath();
    ctx.arc(p.x, p.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();
  });
}

/* =========================
   LOOP
========================= */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") paddle.dx = paddle.speed;
  if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
  if (e.key.toLowerCase() === "x") activateBites();
});

document.addEventListener("keyup", e => {
  if (e.key.includes("Arrow")) paddle.dx = 0;
});

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawPaddle();

  if (rewinding) {
    drawHighlights();
    rewindBall();
    drawBall();
  } else {
    movePaddle();
    moveBall();
    drawTrail();
    drawBall();
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
